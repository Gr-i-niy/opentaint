rules:
  - id: approximation-rule
    severity: ERROR
    message: Tainted value from Taint.source() reached Taint.sink() through an approximated method
    metadata:
      short-description: Approximation test source-to-sink flow
    languages:
      - java
    mode: taint
    pattern-sources:
      - pattern: test.Taint.source()
    pattern-sinks:
      - patterns:
          - pattern: test.Taint.sink($VALUE)
          - focus-metavariable: $VALUE
